[global]
    font = "Monospace 9"
    line_height = 8
    # transparency 已废弃，建议直接在背景色中使用 RGBA (如 #ffffffE6)
    # 但保留它通常也能兼容，只是会有警告。这里先注释掉，建议修改下面的颜色代码
    # transparency = 10
    markup = full

    # --- 1. 修复 geometry (位置与大小) ---
    # 旧写法: geometry = "300x5-20+40"
    # 新写法拆分为: width, height, origin, offset
    width = (300, 400)
    # 设置高度范围 (最小高度, 最大高度)，0表示自动适应内容
    height = (0, 300)
    # -20+40 意味着右上角 (因为X是负数，Y是正数)
    origin = top-right
    # 距离屏幕边缘的偏移量: 20x40
    offset = (20, 40)

    padding = 10
    horizontal_padding = 30

    format = "<b>%s %p</b>\n%b"
    alignment = center
    vertical_alignment = top
    corner_radius = 3
    word_wrap = yes
    ellipsize = middle

    min_icon_size = 0
    max_icon_size = 64

    sort = yes
    separator_color = frame
    separator_height = 2
    stack_duplicates = true

    # --- 2. 修复 startup_notification ---
    # 该选项已被移除，直接删除即可

    monitor = 0
    sticky_history = yes
    show_age_threshold = 60
    idle_threshold = 0

    dmenu = /usr/bin/dmenu -p dunst:
    show_indicators = true

    # --- 3. 鼠标交互 (保留在 global) ---
    mouse_left_click = do_action
    mouse_middle_click = close_current
    mouse_right_click = close_current

    # --- 4. 修复 [frame] ---
    # [frame] 区域已废弃，属性合并到 [global]
    frame_width = 1
    frame_color = "#000000"

# --- 5. 修复 [shortcuts] ---
# 警告：Dunst 不再支持内部定义键盘快捷键 (如 ctrl+space)
# 你需要在你的 窗口管理器 (i3, hyprland, sxhkd) 中绑定命令。
# 详情见下文解释。

[urgency_low]
    background = "#ffffff"
    foreground = "#000000"
    timeout = 30

[urgency_normal]
    background = "#141B1F"
    foreground = "#ffffff"
    timeout = 45

[urgency_critical]
    # --- 6. 修复每种规则独立的 geometry ---
    # 警告：Dunst 新版不再支持针对不同 urgency 改变窗口大小/位置
    # 这行必须删除，否则报错
    # geometry = "320x6-200+40"

    background = "#ff9999"
    foreground = "#000000"
    timeout = 0